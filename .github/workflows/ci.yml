name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  Quality-Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run HTMLHint
        run: npx htmlhint "src/*.html"

      - name: Run Stylelint
        run: npx stylelint "styles/*.css"

      - name: Build with Parcel
        run: npx parcel build src/index.html --dist-dir dist

  Docker-Build:
    needs: Quality-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t notice-board:latest .