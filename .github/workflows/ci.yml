name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  Quality-Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3[cite: 2]

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install[cite: 2]

      - name: Run HTMLHint
        run: npx htmlhint "src/*.html"[cite: 2]

      - name: Run Stylelint
        run: npx stylelint "styles/*.css"[cite: 2]

      - name: Build with Parcel
        run: npx parcel build src/index.html --dist-dir dist[cite: 2]

  Docker-Build:
    needs: Quality-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3[cite: 2]

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notice-board:latest .[cite: 2]
      
      # We will add the "Push to Docker Hub" part once you have your secrets ready!